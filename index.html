<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Free Wallpapers</title>

  <link rel="stylesheet" href="style.css">

  <!-- Google AdSense -->
  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6645064236411218"
    crossorigin="anonymous">
  </script>

</head>
<body>

  <header>
    <h1>FREE-WALLPAPERS</h1>

    <input
      type="text"
      id="search"
      placeholder="ค้นหาวอลเปเปอร์..."
    >
  </header>

  <!-- ADS -->
  <div class="ads">

    <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="ca-pub-6645064236411218"
      data-ad-slot="1234567890"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>

    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

  </div>

  <main class="grid" id="wallpapers">

    <div class="card">
      <img src="https://picsum.photos/500/700?1">

      <div class="content">
        <h2>Cyber Dark</h2>

        <button>ดาวน์โหลด</button>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/500/700?2">

      <div class="content">
        <h2>AMOLED Space</h2>

        <button>ดาวน์โหลด</button>
      </div>
    </div>

    <div class="card">
      <img src="https://picsum.photos/500/700?3">

      <div class="content">
        <h2>Gaming RGB</h2>

        <button>ดาวน์โหลด</button>
      </div>
    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
