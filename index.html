<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Wallpapers Hub - ดาวน์โหลดวอลเปเปอร์ฟรี</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- AdSense Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6645064236411218" crossorigin="anonymous"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        primary: '#8b5cf6',
                        secondary: '#06b6d4',
                    }
                }
            }
        }
    </script>
    <style>
        .masonry-grid {
            column-count: 1;
            column-gap: 1.5rem;
        }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1280px) { .masonry-grid { column-count: 4; } }

        .wallpaper-card {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .wallpaper-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.1), 0 10px 10px -5px rgba(139, 92, 246, 0.04);
        }
        
        /* Fixed Ad Containers to prevent availableWidth=0 */
        .ad-slot-wrapper {
            min-height: 100px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .gradient-text {
            background: linear-gradient(to right, #a78bfa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans transition-colors duration-300">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl border-b border-zinc-200 dark:border-zinc-800">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
            <div class="flex items-center gap-2 font-heading text-2xl font-bold tracking-tighter gradient-text">
                <i data-lucide="zap" class="w-6 h-6 text-violet-500 fill-violet-500"></i>
                FREEWALLS
            </div>
            
            <div class="flex-1 max-w-2xl relative hidden md:block">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 w-4 h-4"></i>
                <input type="text" id="searchInput" placeholder="ค้นหาวอลเปเปอร์ 4K..." 
                    class="w-full bg-zinc-100 dark:bg-zinc-900 border-none rounded-full py-2 pl-10 pr-4 text-sm focus:ring-2 ring-violet-500/50 outline-none transition-all">
            </div>

            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-900 transition-colors">
                    <i data-lucide="sun" id="sunIcon" class="w-5 h-5 hidden"></i>
                    <i data-lucide="moon" id="moonIcon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4">
        <!-- Hero Section -->
        <section class="py-16 text-center space-y-6 relative overflow-hidden">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[60%] h-full bg-violet-500/10 blur-[120px] rounded-full -z-10"></div>
            <h1 class="text-4xl md:text-6xl font-heading font-bold tracking-tight">Premium Wallpapers <br><span class="text-violet-500">Free Forever.</span></h1>
            <p class="text-zinc-500 max-w-xl mx-auto">แหล่งรวมภาพพื้นหลังคุณภาพสูงและ Live Wallpapers สำหรับทุกอุปกรณ์ของคุณ</p>
        </section>

        <div class="max-w-4xl mx-auto my-8 bg-zinc-100 dark:bg-zinc-900/50 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-4 ad-slot-wrapper">
            <span class="text-[10px] text-zinc-500 uppercase tracking-widest mb-2 font-bold">Advertisement</span>
            <ins class="adsbygoogle"
                 style="display:block; width:100%; min-width:250px; min-height:90px"
                 data-ad-client="ca-pub-6645064236411218"
                 data-ad-slot="default"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>

        <div class="py-8 flex flex-wrap items-center gap-3 justify-center" id="categoryFilters"></div>

        <div class="masonry-grid" id="wallpaperGrid"></div>

        <div class="py-12 flex justify-center">
            <button id="loadMore" class="px-8 py-3 bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 rounded-xl font-bold hover:scale-105 transition-all flex items-center gap-2">
                โหลดเพิ่มเติม
            </button>
        </div>
    </main>

    <!-- Fullscreen Modal -->
    <div id="modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-sm" id="modalOverlay"></div>
        <div class="relative z-10 max-w-5xl w-full bg-zinc-900 rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row max-h-[90vh]">
            <button id="closeModal" class="absolute top-4 right-4 z-20 p-2 bg-black/40 text-white rounded-full hover:bg-black/60 transition-colors">
                <i data-lucide="x"></i>
            </button>
            <div class="flex-[2] bg-black flex items-center justify-center overflow-hidden">
                <div id="modalContent" class="w-full h-full flex items-center justify-center"></div>
            </div>
            <div class="flex-1 p-8 flex flex-col justify-between bg-zinc-900 border-l border-zinc-800">
                <div class="space-y-6">
                    <div>
                        <h2 id="modalTitle" class="text-2xl font-bold text-white">Title</h2>
                        <p id="modalAuthor" class="text-zinc-400 text-sm mt-1">by Creative Artist</p>
                    </div>
                    <div class="py-4 border-y border-zinc-800 ad-slot-wrapper">
                         <span class="text-[10px] text-zinc-500 uppercase tracking-widest mb-2 font-bold">Sponsored</span>
                         <ins class="adsbygoogle"
                              id="modalAd"
                              style="display:block; width:100%; min-height:100px"
                              data-ad-client="ca-pub-6645064236411218"
                              data-ad-slot="default"
                              data-ad-format="rectangle"></ins>
                    </div>
                </div>
                <div class="space-y-3">
                    <button id="downloadBtn" class="w-full py-4 bg-gradient-to-r from-violet-600 to-cyan-500 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
                        <i data-lucide="download"></i> Download 4K
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="border-t border-zinc-200 dark:border-zinc-800 py-12 text-center text-zinc-500 text-sm">
        <p>© 2024 FreeWalls Hub. Ads by Google AdSense.</p>
    </footer>

    <script>
        const CATEGORIES = ['Nature', 'Anime', 'Cars', 'Space', 'Abstract', 'Minimal', 'Gaming'];
        const MOCK_DATA = Array.from({ length: 12 }).map((_, i) => ({
            id: i,
            title: `Wallpaper ${i + 1}`,
            author: 'Creative Artist',
            url: `https://picsum.photos/seed/${i + 20}/800/${i % 2 === 0 ? '1200' : '800'}`,
            isLive: i % 4 === 0,
            videoUrl: i % 4 === 0 ? 'https://assets.mixkit.co/videos/preview/mixkit-star-field-in-deep-space-34356-large.mp4' : null
        }));

        let activeCategory = 'Nature';
        const grid = document.getElementById('wallpaperGrid');
        const modal = document.getElementById('modal');

        function initIcons() { lucide.createIcons(); }

        function pushAds() {
            try {
                const ads = document.querySelectorAll('.adsbygoogle:not([data-adsbygoogle-status])');
                ads.forEach(ad => {
                    // Only push if parent has width
                    if (ad.parentElement.offsetWidth > 0) {
                        (window.adsbygoogle = window.adsbygoogle || []).push({});
                    }
                });
            } catch (e) {
                console.error("AdSense Push Error: ", e);
            }
        }

        function renderWallpapers() {
            grid.innerHTML = MOCK_DATA.map(wp => `
                <div class="wallpaper-card group relative rounded-2xl overflow-hidden cursor-zoom-in bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800" onclick="openModal(${wp.id})">
                    ${wp.isLive ? `
                        <div class="absolute top-3 left-3 z-10 bg-black/50 backdrop-blur-md text-white text-[10px] px-2 py-1 rounded-md flex items-center gap-1 font-bold">LIVE</div>
                        <video src="${wp.videoUrl}" loop muted playsinline class="w-full h-auto object-cover" onmouseover="this.play()" onmouseout="this.pause()"></video>
                    ` : `
                        <img src="${wp.url}" class="w-full h-auto object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
                    `}
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 flex flex-col justify-end p-4">
                        <h3 class="text-white text-sm font-bold truncate">${wp.title}</h3>
                    </div>
                </div>
            `).join('');
            initIcons();
        }

        function openModal(id) {
            const wp = MOCK_DATA.find(i => i.id === id);
            document.getElementById('modalTitle').innerText = wp.title;
            document.getElementById('modalContent').innerHTML = wp.isLive 
                ? `<video src="${wp.videoUrl}" autoplay loop muted class="max-h-full w-auto"></video>`
                : `<img src="${wp.url}" class="max-h-full w-auto object-contain" />`;
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            // Special handling for Ad in Modal after it's visible
            setTimeout(() => {
                const modalAd = document.getElementById('modalAd');
                if (modalAd && !modalAd.hasAttribute('data-adsbygoogle-status')) {
                    try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e){}
                }
            }, 300);
        }

        function closeModal() {
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }

        window.onload = () => {
            renderWallpapers();
            
            // Wait for Tailwind and DOM to settle before pushing ads
            setTimeout(pushAds, 500);

            document.getElementById('modalOverlay').onclick = closeModal;
            document.getElementById('closeModal').onclick = closeModal;
            document.getElementById('themeToggle').onclick = () => {
                document.documentElement.classList.toggle('dark');
            };
        };
    </script>
</body>
</html>
