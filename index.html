<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Free dark wallpapers website with modern design. AMOLED style, gaming, space, and abstract wallpapers.">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Google AdSense -->

</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-content">
      <div class="logo-section">
        <h1>FREE-WALLPAPERS</h1>
        <span class="tagline">🌙 Beautiful Dark Wallpapers</span>
      </div>
      <input type="text" id="search" class="search-input" placeholder="ค้นหาวอลเปเปอร์...">
    </div>
  </header>

  <!-- CATEGORY FILTER -->
  <section class="category-section">

      <button class="category-btn active" data-filter="all">ทั้งหมด</button>
      <button class="category-btn" data-filter="amoled">AMOLED</button>
      <button class="category-btn" data-filter="gaming">Gaming</button>
      <button class="category-btn" data-filter="space">Space</button>
      <button class="category-btn" data-filter="cars">Cars</button>
      <button class="category-btn" data-filter="abstract">Abstract</button>
    </div>
  </section>

  <!-- ADS -->
  <div class="ads-container">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6645064236411218"
      data-ad-slot="1234567890" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>

  <!-- MAIN GRID -->
  <main class="grid" id="wallpapers">

    <!-- CARD 1: AMOLED -->
    <div class="card" data-category="amoled">

        <button class="download-btn">⬇️ ดาวน์โหลด</button>

    </div>

    <!-- CARD 4: CARS -->
    <div class="card" data-category="cars">
      <div class="card-image">
        <img src="https://picsum.photos/500/700?4" alt="Sports Car Wallpaper" loading="lazy">
        <div class="card-overlay">
          <button class="preview-btn">👁️ ดูตัวอย่าง</button>

    <!-- CARD 5: ABSTRACT -->

  <!-- FOOTER -->
  <footer class="footer">
